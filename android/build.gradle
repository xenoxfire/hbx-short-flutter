// Root build.gradle
// Plugin management has moved to settings.gradle (Flutter 3.22+ style).
// Keep only repository / build-dir configuration here.

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
